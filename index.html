<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Express - 网点基础信息</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.header{background:linear-gradient(135deg,#e8401c 0%,#c0321a 100%);color:#fff;padding:20px 32px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header-logo{width:48px;height:48px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#e8401c}
.header h1{font-size:22px;font-weight:700}
.header p{font-size:13px;opacity:.85;margin-top:2px}
.header-right{margin-left:auto;text-align:right;font-size:12px;opacity:.75}
.main{padding:24px 32px;max-width:1600px;margin:0 auto}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:300px;flex-direction:column;gap:16px;color:#888}
.spinner{width:40px;height:40px;border:3px solid #f0f0f0;border-top-color:#e8401c;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid #e8401c;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-card.blue{border-left-color:#1890ff}
.stat-card.green{border-left-color:#52c41a}
.stat-card.orange{border-left-color:#fa8c16}
.stat-card.purple{border-left-color:#722ed1}
.stat-card.red{border-left-color:#f5222d}
.stat-num{font-size:28px;font-weight:800;line-height:1.2}
.stat-label{font-size:12px;color:#888;margin-top:4px}
.stat-sub{font-size:11px;color:#aaa;margin-top:2px}

/* Filters */
.filters{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.filters-row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.filter-group select,.filter-group input{border:1px solid #d9d9d9;border-radius:6px;padding:6px 10px;font-size:13px;outline:none;min-width:130px;background:#fff}
.filter-group select:focus,.filter-group input:focus{border-color:#e8401c;box-shadow:0 0 0 2px rgba(232,64,28,.1)}
.search-input{min-width:240px!important}
.btn{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
.btn-ghost{background:#f5f5f5;color:#555}
.btn-ghost:hover{background:#e8e8e8}

/* Table */
.table-container{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.table-header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid #f0f0f0}
.table-header h3{font-size:15px;font-weight:600}
.result-count{font-size:13px;color:#888}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#fafafa;padding:10px 12px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #f0f0f0;white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:1}
thead th:hover{background:#f0f0f0}
.sort-icon{margin-left:4px;color:#bbb;font-size:10px}
tbody tr{transition:background .15s}
tbody tr:hover{background:#fff7f5}
tbody td{padding:9px 12px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.cell-id{font-family:monospace;font-weight:600;color:#e8401c;font-size:12px}
.cell-name{font-weight:500;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-signed{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.badge-terminated{background:#fff1f0;color:#f5222d;border:1px solid #ffa39e}
.badge-unknown{background:#fafafa;color:#999;border:1px solid #d9d9d9}
.badge-hub{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
.badge-dc{background:#f9f0ff;color:#722ed1;border:1px solid #d3adf7}
.badge-dp{background:#fff7e6;color:#fa8c16;border:1px solid #ffd591}
.badge-dp0{background:#f5f5f5;color:#666;border:1px solid #d9d9d9}
.btn-detail{background:#fff7f5;color:#e8401c;border:1px solid #ffbb96;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
.btn-detail:hover{background:#e8401c;color:#fff}

/* Pagination */
.pagination{display:flex;justify-content:flex-end;align-items:center;gap:8px;padding:14px 20px;border-top:1px solid #f0f0f0;flex-wrap:wrap}
.page-btn{width:32px;height:32px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.page-btn:hover:not(:disabled){border-color:#e8401c;color:#e8401c}
.page-btn.active{background:#e8401c;color:#fff;border-color:#e8401c}
.page-btn:disabled{opacity:.4;cursor:default}
.page-info{font-size:13px;color:#888;margin-right:4px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;overflow-y:auto;padding:40px 16px}
.modal-overlay.show{display:flex;align-items:flex-start;justify-content:center}
.modal{background:#fff;border-radius:16px;width:100%;max-width:760px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-head{background:linear-gradient(135deg,#e8401c,#c0321a);color:#fff;padding:20px 24px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:flex-start}
.modal-head h2{font-size:18px;font-weight:700}
.modal-head-sub{font-size:13px;opacity:.8;margin-top:4px}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:12px}
.modal-close:hover{background:rgba(255,255,255,.35)}
.modal-body{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:0}
.modal-section{padding:12px 16px}
.modal-section h4{font-size:12px;font-weight:700;color:#e8401c;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #fee8e3}
.modal-section h4+h4,.info-sep{margin-top:16px}
.info-row{display:flex;margin-bottom:8px;font-size:13px}
.info-label{min-width:100px;color:#888;font-size:12px;padding-top:1px;flex-shrink:0}
.info-value{flex:1;color:#222;font-weight:500;word-break:break-all;line-height:1.5}
.info-value.empty{color:#ccc;font-style:italic;font-weight:400}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:#aaa}

@media(max-width:700px){
  .modal-body{grid-template-columns:1fr}
  .main{padding:16px}
  .filters-row{flex-direction:column}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .header{padding:16px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">⚡</div>
  <div>
    <h1>Flash Express — 网点基础信息</h1>
    <p>Branch Information Dashboard · ข้อมูลพื้นฐานสาขา</p>
  </div>
  <div class="header-right">
    <div>数据更新时间</div>
    <div id="updatedAt">加载中...</div>
  </div>
</div>

<div class="main" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div>正在加载数据...</div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h2 id="modalTitle"></h2>
        <div class="modal-head-sub" id="modalSub"></div>
      </div>
      <button class="modal-close" onclick="closeModalBtn()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
let allBranches = [];
let filtered = [];
let sortKey = 'fh_id';
let sortDir = 1;
let page = 1;
const PAGE_SIZE = 50;

// Load data
fetch('data.json')
  .then(r => r.json())
  .then(data => {
    allBranches = data.branches || [];
    document.getElementById('updatedAt').textContent = data.updated_at || '';
    initApp();
  })
  .catch(err => {
    document.getElementById('app').innerHTML =
      `<div class="empty-state" style="color:#f5222d">加载失败：${err.message}</div>`;
  });

function initApp() {
  // Get filter options
  const provinces = [...new Set(allBranches.map(b=>b.province).filter(p=>p&&p!=='Province'))].sort();
  const types = [...new Set(allBranches.map(b=>b.type_simple).filter(t=>t&&!['Branch Type','DP'].includes(t)))].sort();
  const regions = [...new Set(allBranches.map(b=>b.region).filter(r=>r&&r!=='region'))].sort();
  const bds = [...new Set(allBranches.map(b=>b.bd).filter(b=>b&&b!=='BD'))].sort();

  document.getElementById('app').innerHTML = `
    <div class="stats-grid" id="statsGrid"></div>
    <div class="filters">
      <div class="filters-row">
        <div class="filter-group">
          <label>搜索 Search</label>
          <input type="text" class="search-input" id="searchInput" placeholder="FH ID 或网点名称...">
        </div>
        <div class="filter-group">
          <label>状态 Status</label>
          <select id="filterStatus">
            <option value="">全部</option>
            <option value="签约">签约 (Active)</option>
            <option value="解约">解约 (Terminated)</option>
          </select>
        </div>
        <div class="filter-group">
          <label>省份 Province</label>
          <select id="filterProvince">
            <option value="">全部</option>
            ${provinces.map(p=>`<option value="${p}">${p}</option>`).join('')}
          </select>
        </div>
        <div class="filter-group">
          <label>类型 Type</label>
          <select id="filterType">
            <option value="">全部</option>
            ${types.map(t=>`<option value="${t}">${t}</option>`).join('')}
          </select>
        </div>
        <div class="filter-group">
          <label>区域 Region</label>
          <select id="filterRegion">
            <option value="">全部</option>
            ${regions.map(r=>`<option value="${r}">${r}</option>`).join('')}
          </select>
        </div>
        <div class="filter-group">
          <label>BD</label>
          <select id="filterBD">
            <option value="">全部</option>
            ${bds.map(b=>`<option value="${b}">${b}</option>`).join('')}
          </select>
        </div>
        <div class="filter-group">
          <button class="btn btn-ghost" onclick="resetFilters()">重置</button>
        </div>
      </div>
    </div>
    <div class="table-container">
      <div class="table-header">
        <h3>网点列表</h3>
        <span class="result-count" id="resultCount"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th onclick="sortTable('fh_id')">FH ID <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('name')">网点名称 <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('province')">省份 <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('type_simple')">类型 <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('region')">区域 <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('bd')">BD</th>
              <th onclick="sortTable('create_acc')">开通日期 <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('status')">状态 <span class="sort-icon">↕</span></th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="emptyState" style="display:none">没有找到符合条件的网点</div>
      <div class="pagination" id="pagination"></div>
    </div>
  `;

  renderStats();
  applyFilters();

  document.getElementById('searchInput').addEventListener('input', applyFilters);
  ['filterStatus','filterProvince','filterType','filterRegion','filterBD']
    .forEach(id => document.getElementById(id).addEventListener('change', applyFilters));
}

function renderStats() {
  const total = allBranches.length;
  const active = allBranches.filter(b=>b.status==='签约').length;
  const term = allBranches.filter(b=>b.status==='解约').length;
  const hub = allBranches.filter(b=>b.type_simple==='HUB').length;
  const dc = allBranches.filter(b=>b.type_simple==='DC').length;
  const dp0 = allBranches.filter(b=>b.type_simple==='DP0').length;
  const dp13 = allBranches.filter(b=>b.type_simple==='DP13000').length;
  const dp12 = allBranches.filter(b=>b.type_simple==='DP12000').length;
  const dp1 = allBranches.filter(b=>b.type_simple==='DP1000').length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-num">${total.toLocaleString()}</div>
      <div class="stat-label">网点总数 Total</div>
    </div>
    <div class="stat-card green">
      <div class="stat-num" style="color:#52c41a">${active.toLocaleString()}</div>
      <div class="stat-label">签约中 Active</div>
    </div>
    <div class="stat-card red">
      <div class="stat-num" style="color:#f5222d">${term}</div>
      <div class="stat-label">已解约 Terminated</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-num" style="color:#1890ff">${hub + dc}</div>
      <div class="stat-label">HUB / DC</div>
      <div class="stat-sub">HUB ${hub} · DC ${dc}</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-num" style="color:#fa8c16">${dp13+dp12+dp1}</div>
      <div class="stat-label">DP 加盟网点</div>
      <div class="stat-sub">DP13000 ${dp13} · DP12000 ${dp12} · DP1000 ${dp1}</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-num" style="color:#722ed1">${dp0}</div>
      <div class="stat-label">DP0 / 一键注册</div>
    </div>
  `;
}

function applyFilters() {
  const search = (document.getElementById('searchInput').value||'').toLowerCase().trim();
  const status = document.getElementById('filterStatus').value;
  const province = document.getElementById('filterProvince').value;
  const type = document.getElementById('filterType').value;
  const region = document.getElementById('filterRegion').value;
  const bd = document.getElementById('filterBD').value;

  filtered = allBranches.filter(b => {
    if (search && !(b.fh_id+' '+b.name).toLowerCase().includes(search)) return false;
    if (status && b.status !== status) return false;
    if (province && b.province !== province) return false;
    if (type && b.type_simple !== type) return false;
    if (region && b.region !== region) return false;
    if (bd && b.bd !== bd) return false;
    return true;
  });

  filtered.sort((a,b) => {
    const av = (a[sortKey]||'').toString();
    const bv = (b[sortKey]||'').toString();
    return av.localeCompare(bv,'zh') * sortDir;
  });

  page = 1;
  renderTable();
}

function resetFilters() {
  ['searchInput'].forEach(id => document.getElementById(id).value='');
  ['filterStatus','filterProvince','filterType','filterRegion','filterBD']
    .forEach(id => document.getElementById(id).value='');
  applyFilters();
}

function sortTable(key) {
  if (sortKey===key) sortDir=-sortDir; else { sortKey=key; sortDir=1; }
  applyFilters();
}

function statusBadge(s) {
  if (s==='签约') return '<span class="badge badge-signed">签约</span>';
  if (s==='解约') return '<span class="badge badge-terminated">解约</span>';
  return '<span class="badge badge-unknown">—</span>';
}

function typeBadge(t) {
  if (!t) return '<span class="badge badge-unknown">—</span>';
  if (t==='HUB') return `<span class="badge badge-hub">${t}</span>`;
  if (t==='DC') return `<span class="badge badge-dc">${t}</span>`;
  if (t==='DP0') return `<span class="badge badge-dp0">${t}</span>`;
  return `<span class="badge badge-dp">${t}</span>`;
}

function renderTable() {
  const start = (page-1)*PAGE_SIZE;
  const pageData = filtered.slice(start, start+PAGE_SIZE);
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');

  document.getElementById('resultCount').textContent = `共 ${filtered.length} 条`;

  if (!filtered.length) {
    tbody.innerHTML=''; empty.style.display='block';
    document.getElementById('pagination').innerHTML=''; return;
  }
  empty.style.display='none';

  tbody.innerHTML = pageData.map((b,i) => `
    <tr>
      <td><span class="cell-id">${b.fh_id}</span></td>
      <td><span class="cell-name" title="${b.name}">${b.name||'—'}</span></td>
      <td>${b.province||'—'}</td>
      <td>${typeBadge(b.type_simple)}</td>
      <td>${b.region||'—'}</td>
      <td>${b.bd||'—'}</td>
      <td style="font-size:12px;color:#888">${b.create_acc||'—'}</td>
      <td>${statusBadge(b.status)}</td>
      <td><button class="btn-detail" onclick="showDetail(${start+i})">详情</button></td>
    </tr>
  `).join('');

  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length/PAGE_SIZE);
  if (total<=1) { document.getElementById('pagination').innerHTML=''; return; }

  let h = `<span class="page-info">第 ${page}/${total} 页</span>`;
  h += `<button class="page-btn" onclick="goPage(1)" ${page===1?'disabled':''}>«</button>`;
  h += `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  for (let p=Math.max(1,page-2); p<=Math.min(total,page+2); p++) {
    h += `<button class="page-btn ${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  h += `<button class="page-btn" onclick="goPage(${page+1})" ${page===total?'disabled':''}>›</button>`;
  h += `<button class="page-btn" onclick="goPage(${total})" ${page===total?'disabled':''}>»</button>`;
  document.getElementById('pagination').innerHTML = h;
}

function goPage(p) {
  const total = Math.ceil(filtered.length/PAGE_SIZE);
  page = Math.max(1, Math.min(total,p));
  renderTable();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showDetail(idx) {
  const b = filtered[idx];
  if (!b) return;
  const v = x => x ? `<span class="info-value">${x}</span>` : `<span class="info-value empty">—</span>`;
  document.getElementById('modalTitle').textContent = `${b.fh_id} — ${b.name||''}`;
  document.getElementById('modalSub').textContent = [b.province,b.type_simple,b.status].filter(Boolean).join(' · ');
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-section">
      <h4>基本信息</h4>
      <div class="info-row"><span class="info-label">FH ID</span>${v(b.fh_id)}</div>
      <div class="info-row"><span class="info-label">网点名称</span>${v(b.name)}</div>
      <div class="info-row"><span class="info-label">省份</span>${v(b.province)}</div>
      <div class="info-row"><span class="info-label">区域 Region</span>${v(b.region)}</div>
      <div class="info-row"><span class="info-label">类型 Type</span>${v(b.type)}</div>
      <div class="info-row"><span class="info-label">网点分类</span>${v(b.network_type)}</div>
      <div class="info-row"><span class="info-label">佣金比例</span>${v(b.pct?(b.pct+'%'):'')}</div>
      <div class="info-row"><span class="info-label">开通日期</span>${v(b.create_acc)}</div>
      <div class="info-row"><span class="info-label">更新日期</span>${v(b.date)}</div>
      <div class="info-row"><span class="info-label">状态</span>${v(b.status)}</div>
      <div class="info-row"><span class="info-label">解约流程</span>${v(b.termination)}</div>
      <h4 class="info-sep">负责人</h4>
      <div class="info-row"><span class="info-label">AM</span>${v(b.am)}</div>
      <div class="info-row"><span class="info-label">BD</span>${v(b.bd)}</div>
      <div class="info-row"><span class="info-label">BD ID</span>${v(b.bd_id)}</div>
      <div class="info-row"><span class="info-label">联系状态</span>${v(b.contact_status)}</div>
    </div>
    <div class="modal-section">
      <h4>运营信息</h4>
      <div class="info-row"><span class="info-label">门店装修</span>${v(b.shop_design)}</div>
      <div class="info-row"><span class="info-label">自有/租赁</span>${v(b.rent_or_own)}</div>
      <div class="info-row"><span class="info-label">月租金</span>${v(b.rent_amount)}</div>
      <div class="info-row"><span class="info-label">员工情况</span>${v(b.has_staff)}</div>
      <div class="info-row"><span class="info-label">员工工资</span>${v(b.staff_cost)}</div>
      <div class="info-row"><span class="info-label">其他业务</span>${v(b.other_biz)}</div>
      <div class="info-row"><span class="info-label">优惠券类型</span>${v(b.coupon_type)}</div>
      <h4 class="info-sep">竞争分析</h4>
      <div class="info-row"><span class="info-label">竞争品牌</span>${v(b.competitor)}</div>
      <div class="info-row"><span class="info-label">合作品牌</span>${v(b.partner_brand)}</div>
      <div class="info-row"><span class="info-label">系统使用</span>${v(b.single_system)}</div>
      <div class="info-row"><span class="info-label">其他分支</span>${v(b.another_branch)}</div>
      <h4 class="info-sep">地理位置</h4>
      <div class="info-row"><span class="info-label">选址类型</span>${v(b.location)}</div>
      <div class="info-row"><span class="info-label">GPS验证</span>${v(b.gps_correct)}</div>
      <div class="info-row"><span class="info-label">地址</span>${v(b.address)}</div>
      <div class="info-row"><span class="info-label">GPS坐标</span>${v(b.gps)}</div>
      <h4 class="info-sep">配合度 & 建议</h4>
      <div class="info-row"><span class="info-label">配合情况</span>${v(b.cooperation)}</div>
      <div class="info-row"><span class="info-label">关注等级</span>${v(b.attention_level)}</div>
      <div class="info-row"><span class="info-label">网点建议</span>${v(b.suggestions)}</div>
    </div>
  `;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow='hidden';
}

function closeModal(e) { if (e.target===document.getElementById('modal')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('modal').classList.remove('show'); document.body.style.overflow=''; }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModalBtn(); });
</script>
</body>
</html>
